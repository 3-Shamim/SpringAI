spring:
  application:
    name: image-text-image
  profiles:
    active: dev
  ai:
    openai:
      api-key:
      chat:
        options:
          model: gpt-4o
      image:
        options:
          model: gpt-image-2
          n: 1
          size: 1024x1024
          quality: high
          response-format: b64_json
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB
