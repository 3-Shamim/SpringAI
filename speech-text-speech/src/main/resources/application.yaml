spring:
  application:
    name: speech-text-speech
  profiles:
    active: dev
  ai:
    openai:
      api-key:
      chat:
        model: gpt-4o
        max-tokens: 100
      audio:
        transcription:
          model: whisper-1
          language: en
          temperature: 0.7f
          response-format: vtt # text, json, verbose_json, srt, vtt
        speech:
          model: tts-1
          response-format: mp3
          speed: 1
          voice: nova

